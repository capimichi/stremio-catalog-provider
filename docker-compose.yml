version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: stremio_catalog_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-stremio_catalog}
      MYSQL_USER: ${DB_USER:-catalog_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-catalog_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secure_password}
    ports:
      - "${DB_HOST_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  web-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stremio_catalog_api
    restart: unless-stopped
    command: uvicorn stremio_catalog_provider.api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stremio_catalog_worker
    restart: unless-stopped
    command: python -m stremio_catalog_provider.cli worker
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  mariadb_data:
